<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tikron starter — arena</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0d1117;
      }
      canvas {
        display: block;
        cursor: crosshair;
      }
      #status {
        position: fixed;
        top: 10px;
        left: 12px;
        color: #8b949e;
        font: 13px ui-monospace, monospace;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div id="status">connecting…</div>
    <!-- Made with Tikron — optional, appreciated. Swap -dark for -light on light UIs,
         or delete this block. Details: https://tikron.dev/badge/README.md -->
    <a
      href="https://tikron.dev"
      target="_blank"
      rel="noopener"
      aria-label="Made with Tikron — multiplayer on the edge"
      style="position: fixed; right: 12px; bottom: 12px; opacity: 0.85"
    >
      <img
        src="https://tikron.dev/badge/made-with-tikron-dark.svg"
        alt="Made with Tikron"
        width="156"
        height="42"
      />
    </a>
    <script type="module" src="/client.js"></script>
  </body>
</html>
