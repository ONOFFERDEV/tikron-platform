<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Tikron .io Arena">
  <defs>
    <linearGradient id="io-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1420"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <radialGradient id="io-glow" cx="0.7" cy="0.35" r="0.65">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="io-dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#1b2634"/>
    </pattern>
  </defs>
  <rect width="640" height="360" fill="url(#io-bg)"/>
  <rect width="640" height="360" fill="url(#io-dots)"/>
  <rect width="640" height="360" fill="url(#io-glow)"/>
  <!-- floating blobs -->
  <g opacity="0.95">
    <circle cx="470" cy="130" r="58" fill="#00e5a0" fill-opacity="0.18" stroke="#00e5a0" stroke-opacity="0.6" stroke-width="2"/>
    <circle cx="540" cy="205" r="30" fill="#58a6ff" fill-opacity="0.18" stroke="#58a6ff" stroke-opacity="0.6" stroke-width="2"/>
    <circle cx="418" cy="212" r="20" fill="#f2cc60" fill-opacity="0.16" stroke="#f2cc60" stroke-opacity="0.55" stroke-width="2"/>
  </g>
  <text x="40" y="250" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="40" font-weight="700" fill="#e6edf3">.io Arena</text>
  <text x="42" y="284" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16" fill="#8b98a8">grow · absorb · interest-managed</text>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="13" font-weight="600">
    <rect x="40" y="40" width="132" height="26" rx="13" fill="none" stroke="#00e5a0" stroke-opacity="0.5"/>
    <text x="56" y="57" fill="#00e5a0">MADE WITH TIKRON</text>
  </g>
</svg>
