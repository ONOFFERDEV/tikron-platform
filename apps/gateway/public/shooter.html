<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tikron · FPS demo (top-down shooter)</title>
    <meta name="description" content="Live Tikron demo — a server-authoritative top-down shooter with subtick input timestamps, server-side lag compensation, quantized state, and interest management on Cloudflare Durable Objects." />
    <meta name="theme-color" content="#0a0e14" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/brand.css" />
    <style>
      body {
        overflow: hidden;
      }
      /* slim top bar over the game */
      .demobar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 16px;
        background: rgba(10, 14, 20, 0.82);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--border);
      }
      .demobar .right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      canvas#c {
        display: block;
        margin: 72px auto 0;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        max-width: 96vw;
        cursor: crosshair;
      }
      /* existing demo elements — IDs unchanged, restyled as branded panels */
      #status {
        position: fixed;
        top: 64px;
        left: 16px;
        z-index: 2;
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--muted);
        background: rgba(16, 21, 29, 0.85);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 5px 12px;
      }
      #lb {
        position: fixed;
        top: 64px;
        right: 16px;
        z-index: 2;
        min-width: 140px;
        padding: 10px 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.5;
        color: var(--text);
        background: rgba(16, 21, 29, 0.85);
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      #lb b {
        color: var(--neon);
        text-shadow: var(--glow);
      }
      #lb ol {
        margin: 6px 0 0;
        padding-left: 18px;
      }
    </style>
  </head>
  <body>
    <div class="demobar">
      <a class="wordmark" href="/" aria-label="Tikron home">
        <img src="/favicon.svg" width="24" height="24" alt="" />
        t<span class="i">i</span>kron
      </a>
      <div class="right">
        <span class="badge badge-neon badge-dot">Built with Tikron</span>
        <a class="btn btn-primary" href="/dashboard/">Get started</a>
      </div>
    </div>

    <div id="status">connecting…</div>
    <div id="lb"><b>shooter-top</b></div>
    <canvas id="c" width="900" height="640"></canvas>
    <script type="module" src="/shooter.js"></script>
  </body>
</html>
