        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="27" font-weight="600" letter-spacing="0.5">
    <tspan fill="#e6edf3">t</tspan><tspan fill="#00e5a0">i</tspan><tspan fill="#e6edf3">kron</tspan>
  </text>
</svg>
