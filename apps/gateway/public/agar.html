<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PlayEdge · .io demo (agar)</title>
    <style>
      html,
      body {
        margin: 0;
        background: #0d1117;
        color: #e6edf3;
        font-family: ui-monospace, monospace;
        overflow: hidden;
      }
      #status {
        position: fixed;
        top: 10px;
        left: 12px;
        font-size: 12px;
        color: #8b949e;
        z-index: 1;
      }
      #lb {
        position: fixed;
        top: 10px;
        right: 12px;
        min-width: 130px;
        padding: 8px 10px;
        font-size: 12px;
        line-height: 1.5;
        background: rgba(22, 27, 34, 0.85);
        border: 1px solid #30363d;
        border-radius: 6px;
        z-index: 1;
      }
      #lb b {
        color: #f2cc60;
      }
      #lb ol {
        margin: 4px 0 0;
        padding-left: 18px;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="status">connecting…</div>
    <div id="lb"><b>agar-top</b></div>
    <canvas id="c" width="900" height="640"></canvas>
    <script type="module" src="/agar.js"></script>
  </body>
</html>
