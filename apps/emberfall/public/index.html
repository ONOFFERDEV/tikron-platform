<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emberfall</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0b0f15;
        color: #e6edf3;
        font: 14px ui-monospace, monospace;
      }
      h1 {
        position: fixed;
        top: 16px;
        left: 16px;
        margin: 0;
        color: #c9a86a;
        font: 600 20px ui-monospace, monospace;
        letter-spacing: 0.08em;
        pointer-events: none;
        z-index: 1;
      }
      canvas {
        display: block;
      }

      /* --- HUD overlay (client/ui.ts owns the DOM inside #hud) --- */
      #hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        user-select: none;
      }
      .hud-hidden {
        display: none !important;
      }

      .hud-status {
        position: fixed;
        top: 16px;
        right: 16px;
        color: #8b949e;
        font-size: 12px;
      }

      .hud-bar {
        position: relative;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 3px;
        overflow: hidden;
      }
      .hud-bar-fill {
        height: 100%;
        transition: width 0.15s ease-out;
      }
      .hud-bar-hp {
        width: 220px;
        height: 12px;
      }
      .hud-bar-hp .hud-bar-fill {
        background: #f85149;
      }
      .hud-bar-mp {
        width: 220px;
        height: 8px;
        margin-top: 4px;
      }
      .hud-bar-mp .hud-bar-fill {
        background: #58a6ff;
      }
      .hud-bar-cast {
        width: 260px;
        height: 8px;
      }
      .hud-bar-cast .hud-bar-fill {
        background: #f2cc60;
        transition: width 0.05s linear;
      }

      .hud-vitals {
        position: fixed;
        left: 16px;
        bottom: 16px;
      }
      .hud-vitals-label {
        margin-bottom: 4px;
        color: #e6edf3;
        font-weight: 600;
      }

      .hud-castbar {
        position: fixed;
        left: 50%;
        bottom: 118px;
        transform: translateX(-50%);
        text-align: center;
      }
      .hud-castbar-label {
        margin-bottom: 4px;
        color: #f2cc60;
        font-size: 12px;
      }

      .hud-target {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }
      .hud-target-name {
        margin-bottom: 4px;
        color: #e6edf3;
      }

      .hud-hotbar {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        display: flex;
        gap: 6px;
        pointer-events: auto;
      }
      .hud-hotbar-slot {
        position: relative;
        width: 52px;
        height: 52px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .hud-hotbar-slot:hover {
        border-color: #58a6ff;
      }
      .hud-hotbar-locked {
        color: #6e7681;
        cursor: default;
        filter: grayscale(1);
        opacity: 0.5;
      }
      .hud-hotbar-key {
        position: absolute;
        top: 2px;
        left: 4px;
        font-size: 10px;
        color: #8b949e;
      }
      .hud-hotbar-label {
        font-size: 13px;
        font-weight: 600;
      }
      .hud-hotbar-sweep {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(11, 15, 21, 0.75);
        pointer-events: none;
      }

      .hud-classselect,
      .hud-death {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: rgba(11, 15, 21, 0.82);
        pointer-events: auto;
      }
      .hud-classselect-title,
      .hud-death-label {
        font-size: 22px;
        font-weight: 600;
        color: #c9a86a;
        letter-spacing: 0.05em;
      }
      .hud-classselect-row {
        display: flex;
        gap: 16px;
      }
      .hud-classselect-btn,
      .hud-death-btn {
        padding: 12px 28px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        font-size: 15px;
        cursor: pointer;
      }
      .hud-classselect-btn:hover,
      .hud-death-btn:hover {
        border-color: #c9a86a;
        color: #c9a86a;
      }

      .hud-levelup {
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 28px;
        font-weight: 700;
        color: #f2cc60;
        text-shadow: 0 0 12px rgba(242, 204, 96, 0.6);
      }

      .hud-floats {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      .hud-float {
        position: absolute;
        transform: translate(-50%, -100%);
        font-weight: 700;
        font-size: 14px;
        white-space: nowrap;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      }

      /* --- start screen (character create/continue, client/start-screen.ts) --- */
      .start-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: rgba(11, 15, 21, 0.92);
        pointer-events: auto;
      }
      .start-title {
        font-size: 26px;
        font-weight: 700;
        color: #c9a86a;
        letter-spacing: 0.14em;
      }
      .start-status {
        color: #8b949e;
        font-size: 12px;
      }
      .start-error {
        color: #f85149;
        font-size: 12px;
      }
      .start-menu {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .start-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 240px;
        padding: 16px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
      }
      .start-section-label {
        font-size: 12px;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .start-nickname-input,
      .start-continue-input {
        background: #0b0f15;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        padding: 8px 10px;
      }
      .start-class-row {
        display: flex;
        gap: 6px;
      }
      .start-class-btn {
        flex: 1;
        padding: 8px 0;
        background: #0b0f15;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        cursor: pointer;
      }
      .start-class-btn-selected {
        border-color: #c9a86a;
        color: #c9a86a;
      }
      .start-create-btn,
      .start-continue-btn {
        padding: 10px 0;
        background: #0b0f15;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        cursor: pointer;
      }
      .start-create-btn:not(:disabled):hover,
      .start-continue-btn:not(:disabled):hover {
        border-color: #58a6ff;
        color: #58a6ff;
      }
      .start-create-btn:disabled,
      .start-continue-btn:disabled,
      .start-class-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }

      /* --- HUD menu (☰ button + 이어하기 코드 panel, client/ui.ts) --- */
      .hud-menu {
        position: fixed;
        top: 40px;
        right: 16px;
        z-index: 3;
        pointer-events: auto;
      }
      .hud-menu-toggle {
        width: 28px;
        height: 28px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #8b949e;
        cursor: pointer;
      }
      .hud-menu-panel {
        position: absolute;
        top: 34px;
        right: 0;
        width: 220px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 12px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
      }
      .hud-menu-nickname {
        color: #e6edf3;
        font-weight: 600;
      }
      .hud-menu-code-label {
        color: #8b949e;
        font-size: 11px;
      }
      .hud-menu-code-row {
        display: flex;
        gap: 6px;
      }
      .hud-menu-code-input {
        flex: 1;
        min-width: 0;
        background: #0b0f15;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        font-size: 11px;
        padding: 4px 6px;
      }
      .hud-menu-copy-btn,
      .hud-menu-newchar-btn {
        background: #0b0f15;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        padding: 4px 8px;
      }
      .hud-menu-copy-btn:hover,
      .hud-menu-newchar-btn:hover {
        border-color: #58a6ff;
        color: #58a6ff;
      }

      /* --- inventory / shop panels (client/inventory-ui.ts) --- */
      .inv-panel,
      .shop-panel {
        position: fixed;
        inset: 0;
        z-index: 4;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: rgba(11, 15, 21, 0.6);
        pointer-events: auto;
      }
      .inv-header,
      .shop-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        width: 276px;
        padding: 10px 16px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
      }
      .inv-title,
      .shop-title {
        color: #c9a86a;
        font-weight: 600;
        letter-spacing: 0.05em;
      }
      .inv-gold,
      .shop-gold {
        color: #f2cc60;
        font-size: 13px;
      }
      .panel-close {
        width: 26px;
        height: 26px;
        flex: none;
        background: #0b0f15;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        line-height: 1;
        cursor: pointer;
      }
      .panel-close:hover {
        border-color: #c9a86a;
        color: #c9a86a;
      }
      .inv-equip-row {
        display: flex;
        gap: 8px;
        width: 276px;
        padding: 10px 16px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
      }
      .inv-equip-slot {
        flex: 1;
        padding: 8px 4px;
        background: #0b0f15;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        font-size: 11px;
        cursor: pointer;
      }
      .inv-equip-slot:disabled {
        color: #6e7681;
        cursor: default;
      }
      .inv-grid {
        display: grid;
        grid-template-columns: repeat(4, 56px);
        gap: 6px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 16px;
      }
      .inv-slot {
        width: 56px;
        height: 56px;
        background: #0b0f15;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font-size: 10px;
        line-height: 1.2;
        overflow: hidden;
        cursor: pointer;
        padding: 2px;
      }
      .inv-slot-empty {
        cursor: default;
      }
      .inv-slot-selected {
        border-color: #58a6ff;
      }
      .inv-actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 10px;
      }
      .inv-action-btn {
        padding: 6px 16px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        cursor: pointer;
      }
      .inv-action-btn:hover {
        border-color: #58a6ff;
        color: #58a6ff;
      }
      .shop-header,
      .shop-buy-row,
      .shop-sell-list {
        width: 320px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 12px 16px;
      }
      .shop-buy-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: 8px;
        max-height: 240px;
        overflow-y: auto;
      }
      .shop-buy-btn,
      .shop-sell-btn {
        background: #0b0f15;
        border: 1px solid #30363d;
        border-radius: 4px;
        color: #e6edf3;
        font: inherit;
        cursor: pointer;
        padding: 6px 10px;
      }
      .shop-buy-btn:hover,
      .shop-sell-btn:hover {
        border-color: #58a6ff;
        color: #58a6ff;
      }
      .shop-sell-list {
        margin-top: 8px;
        max-height: 240px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .shop-sell-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .shop-sell-label {
        font-size: 12px;
        color: #e6edf3;
      }

      /* --- minimap (client/minimap.ts) --- */
      .minimap-wrap {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 2;
        border-radius: 50%;
      }
      .minimap-canvas {
        display: block;
        border-radius: 50%;
      }

      /* --- zone-transition fade (client/main.ts) --- */
      .zone-fade {
        position: fixed;
        inset: 0;
        z-index: 9;
        background: #0b0f15;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease;
      }
      .zone-fade-visible {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <h1>EMBERFALL</h1>
    <div id="hud"></div>
    <script type="module" src="/client.js"></script>
  </body>
</html>
